<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sleep Awareness</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      line-height: 1.6;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
    }

    .navbar a {
      color: #fff;
      margin-left: 20px;
      text-decoration: none;
      transition: 0.3s;
    }

    .navbar a:hover {
      opacity: 0.7;
    }

    .logo {
      font-weight: bold;
      font-size: 1.3rem;
    }

    .hero {
      text-align: center;
      padding: 120px 20px;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .hero p {
      margin-bottom: 30px;
      opacity: 0.9;
    }

    .hero button {
      padding: 12px 28px;
      border: none;
      border-radius: 30px;
      background: #fff;
      color: #333;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .hero button:hover {
      transform: scale(1.05);
    }

    .section {
      background: #fff;
      color: #333;
      padding: 70px 20px;
      text-align: center;
    }

    .section h2 {
      margin-bottom: 15px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.3);
    }

    .fade {
      opacity: 0;
      transform: translateY(20px);
      transition: 0.8s ease;
    }

    .fade.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

  <header class="navbar">
    <div class="logo">Sleep Awareness</div>
    <nav>
      <a href="#">Home</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main class="hero">
    <h1>Sleep Awareness</h1>
    <p>Because better sleep means a better you.</p>
    <button onclick="redirectUser()">Get Started</button>
  </main>

  <section id="about" class="section fade">
    <h2>About</h2>
    <p>This website is dedicated to raising awareness about the importance of healthy sleep and helping people build better sleep habits.</p>
  </section>

  <section id="contact" class="section fade">
    <h2>Contact</h2>
    <p>konstantin.noll@icloud.com</p>
  </section>

  <footer>
    <p>© 2026 Konstantin Noll</p>
  </footer>

  <script>
    function redirectUser() {
      // 🔧 Replace this later with your actual redirect
      window.location.href = "https://example.com";
    }

    const faders = document.querySelectorAll(".fade");

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("show");
        }
      });
    });

    faders.forEach(el => observer.observe(el));
  </script>

</body>
</html>
